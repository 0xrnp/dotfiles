# =============================================================================
# ~/.config/tmux/tmux.conf — managed via dotfiles (github.com/0xrnp/dotfiles)
# Catppuccin Mocha theme + clean daily-driver setup
# Built for: Ghostty + Neovim on macOS
# =============================================================================

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",$TERM:RGB"    # Ghostty true-color support

set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off               # Don't exit tmux when closing a session

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind e new-window -n "tmux.conf" "nvim ~/.config/tmux/tmux.conf"

# ── Windows (Tabs) ────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind X kill-window                         # Capital X for window to prevent accidents

# Switch tabs with numbers
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ── Panes ─────────────────────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Quick pane switch with Space
bind Space last-pane
# Fullscreen toggle
bind z resize-pane -Z
# Close pane
bind x kill-pane                           # Lowercase x for pane (Tmux standard)

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vim keys) ───────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Sessions ──────────────────────────────────────────────────────────────────
bind S choose-session
bind $ command-prompt -I "#S" "rename-session '%%'"

# ── Global Status Bar Layout ──────────────────────────────────────────────────
set -g status-position top
set -g status-left-length 100
set -g status-right-length 150

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @catppuccin_flavor 'mocha'

# ── PowerKit Framework (Replaces Manual Catppuccin Config) ────────────────────
# Variables MUST sit above the loader line
# set -g @powerkit_theme 'catppuccin'
# set -g @powerkit_theme_variant 'mocha'
set -g @powerkit_separator_style 'rounded'
set -g @powerkit_edge_separator_style 'rounded'
set -g @powerkit_transparent 'true'
set -g @powerkit_elements_spacing 'both'
set -g @powerkit_bar_layout 'single'
set -g @powerkit_status_order 'session,windows,plugins'
set -g @powerkit_plugins 'datetime'
set -g @powerkit_plugin_datetime_format '%a %d %b • %I:%M %p'
set -g @powerkit_status_interval '5'

# Load the plugin
set -g @plugin 'fabioluciano/tmux-powerkit'

# ── Resurrect Config ──────────────────────────────────────────────────────────
set -g @resurrect_capture_pane_contents 'on'
set -g @resurrect_strategy_nvim 'session'
set -g @continuum_restore 'on'
set -g @continuum_save_interval '5'

# ── Initialize TPM (keep at bottom) ──────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
